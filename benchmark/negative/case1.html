<!DOCTYPE html>
<html><head><title>Benchmark: Negative Case 1 (synthetic)</title></head>
<body>
  <h1>Synthetic Test Checkout — NOT a real company</h1>

  <div class="consent-banner">
    <p>We use cookies to improve your experience. See our privacy policy.</p>
    <button style="font-size:14px;padding:8px 16px;">Accept</button>
    <button style="font-size:14px;padding:8px 16px;">Decline</button>
  </div>

  <form>
    <label><input type="checkbox" id="newsletter" /> </label>
    <label for="newsletter">Sign me up for the newsletter (optional)</label>
    <br/>
    <label><input type="checkbox" checked id="tos" /></label>
    <label for="tos">I agree to the Terms of Service (required)</label>
    <br/>
    <button type="submit">Checkout</button>
    <br/>
    <a href="#">No thanks</a>
  </form>
</body></html>
